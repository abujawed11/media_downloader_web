version: '3.8'

services:
  # PostgreSQL - Media Library Database (commented out: using host machine's PostgreSQL instead)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: media-downloader-postgres
  #   environment:
  #     POSTGRES_DB: medialib
  #     POSTGRES_USER: mediauser
  #     POSTGRES_PASSWORD: mediapass
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U mediauser -d medialib"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - media-network

  # Redis - Job Queue & Cache
  redis:
    image: redis:7-alpine
    container_name: media-downloader-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - media-network

  # FastAPI Backend
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: media-downloader-api
    ports:
      - "8000:8000"
    environment:
      # These MUST override .env because they use Docker service hostnames
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      # DATABASE_URL=postgresql+asyncpg://mediauser:mediapass@postgres:5432/medialib
      - DATABASE_URL=postgresql+asyncpg://mediauser:mediapass@host.docker.internal:5432/medialib
      - LOCAL_STORAGE_PATH=/app/media_storage
      - MINIO_ENDPOINT_URL=http://minio:9000
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - D:/docker-data/downloads:/app/downloads
      - D:/docker-data/media_storage:/app/media_storage
      - ./server/cookies:/app/cookies
    depends_on:
      redis:
        condition: service_healthy
      # postgres:
      #   condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - media-network

  # Celery Worker - Download Processor
  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: media-downloader-worker
    environment:
      # These MUST override .env because they use Docker service hostnames
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      # DATABASE_URL=postgresql+asyncpg://mediauser:mediapass@postgres:5432/medialib
      - DATABASE_URL=postgresql+asyncpg://mediauser:mediapass@host.docker.internal:5432/medialib
      - LOCAL_STORAGE_PATH=/app/media_storage
      - MINIO_ENDPOINT_URL=http://minio:9000
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - D:/docker-data/downloads:/app/downloads
      - D:/docker-data/media_storage:/app/media_storage
      - ./server/cookies:/app/cookies
    depends_on:
      redis:
        condition: service_healthy
      # postgres:
      #   condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    networks:
      - media-network

  # MinIO - Local S3-compatible object storage
  minio:
    image: minio/minio
    container_name: media-downloader-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - D:/docker-data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - media-network

  # Celery Flower - Monitoring Dashboard (Optional)
  flower:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: media-downloader-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - ./server/.env
    depends_on:
      - redis
      - worker
    command: celery -A app.celery_app flower --port=5555
    networks:
      - media-network

volumes:
  # postgres_data:
  redis_data:

networks:
  media-network:
    driver: bridge
